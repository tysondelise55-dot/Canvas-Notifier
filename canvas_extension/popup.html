<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Canvas Assistant</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Settings view -->
  <div id="settings-view" class="view hidden">
    <div class="settings-header">
      <button id="back-btn" class="icon-btn">&#8592;</button>
      <h2>Settings</h2>
    </div>
    <div class="settings-body">
      <label>Canvas URL</label>
      <input id="canvas-url" type="text" placeholder="https://yourschool.instructure.com">

      <label>Canvas API Token</label>
      <input id="canvas-token" type="password" placeholder="Your Canvas token">
      <small>Canvas &rarr; Account &rarr; Settings &rarr; New Access Token</small>

      <label>Anthropic API Key</label>
      <input id="anthropic-key" type="password" placeholder="sk-ant-...">
      <small>console.anthropic.com</small>

      <button id="save-btn" class="primary-btn">Save</button>
      <p id="save-msg" class="hidden success-msg">Saved!</p>
    </div>
  </div>

  <!-- Chat view -->
  <div id="chat-view" class="view">
    <div class="chat-header">
      <div class="header-left">
        <span class="logo">&#10033;</span>
        <span class="title">Canvas Assistant</span>
      </div>
      <button id="settings-btn" class="icon-btn" title="Settings">&#9881;</button>
    </div>

    <div id="messages" class="messages">
      <div class="message assistant">
        <div class="bubble">Hi Tyson! Ask me anything about your Canvas assignments — due dates, upcoming tests, study tips, you name it.</div>
      </div>
    </div>

    <div class="input-row">
      <input id="question-input" type="text" placeholder="Ask about your assignments..." autocomplete="off">
      <button id="send-btn" class="send-btn">&#10148;</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
