<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Canvas Assistant</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Settings view -->
  <div id="settings-view" class="view hidden">
    <div class="settings-header">
      <button id="back-btn" class="icon-btn">&#8592;</button>
      <h2>Settings</h2>
    </div>
    <div class="settings-body">
      <label>Your Name</label>
      <input id="user-name" type="text" placeholder="e.g. Tyson">

      <label>Canvas URL</label>
      <input id="canvas-url" type="text" placeholder="https://yourschool.instructure.com">

      <label>Canvas API Token</label>
      <input id="canvas-token" type="password" placeholder="Your Canvas token">
      <small>Canvas &rarr; Account &rarr; Settings &rarr; New Access Token</small>

      <label>OpenRouter API Key</label>
      <input id="openrouter-key" type="password" placeholder="sk-or-v1-...">
      <small>openrouter.ai &rarr; Keys</small>

      <label>AI Model <span style="font-weight:400;color:var(--text-muted)">(optional)</span></label>
      <input id="model-name" type="text" placeholder="nvidia/nemotron-3-super-120b-a12b:free">
      <small>Any model from openrouter.ai/models</small>

      <button id="save-btn" class="primary-btn">Save settings</button>
      <p id="save-msg" class="hidden success-msg">&#10003; Saved!</p>
    </div>
  </div>

  <!-- Chat view -->
  <div id="chat-view" class="view">
    <div class="chat-header">
      <div class="header-left">
        <span class="logo">&#10035;</span>
        <span class="title">Canvas Assistant</span>
      </div>
      <div class="header-right">
        <button id="clear-btn" class="icon-btn" title="Clear chat">&#9003;</button>
        <button id="settings-btn" class="icon-btn" title="Settings">&#9881;</button>
      </div>
    </div>

    <div id="messages" class="messages">
      <div class="message assistant">
        <div class="bubble">Hi! Ask me anything about your Canvas assignments, or get help with essays, math, science — any homework question.</div>
      </div>
    </div>

    <div class="input-row">
      <textarea id="question-input" placeholder="Ask anything…" rows="1"></textarea>
      <button id="send-btn" class="send-btn" disabled>
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 1l7 7-7 7M1 8h14"/>
        </svg>
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
