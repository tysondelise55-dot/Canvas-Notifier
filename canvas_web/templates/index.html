<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Canvas Assistant</title>
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Canvas">
  <meta name="theme-color" content="#c96442">
</head>
<body>

<!-- Settings modal -->
<div class="overlay hidden" id="settings-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Settings</h2>
      <button class="icon-btn" id="close-settings">✕</button>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <label>Canvas URL</label>
        <input id="s-canvas-url" type="url" placeholder="https://yourschool.instructure.com">
      </div>
      <div class="field-group">
        <label>Canvas API Token</label>
        <input id="s-canvas-token" type="password" placeholder="Your Canvas token">
        <small>Canvas → Account → Settings → New Access Token</small>
      </div>
      <div class="field-group">
        <label>Anthropic API Key</label>
        <input id="s-anthropic-key" type="password" placeholder="sk-ant-...">
        <small>Get one at console.anthropic.com</small>
      </div>
      <button class="auth-btn" id="save-settings-btn" style="margin-top:8px">Save settings</button>
      <p class="save-msg hidden" id="save-msg">✓ Saved!</p>
    </div>
  </div>
</div>

<!-- Mobile sidebar overlay -->
<div class="sidebar-overlay hidden" id="sidebar-overlay"></div>

<div class="page">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-brand">
        <span class="brand-icon">✳</span>
        <span class="brand-name">Canvas Assistant</span>
      </div>
      <button class="new-chat-btn" id="new-chat-btn">
        <span class="new-chat-icon">✏</span>
        New chat
      </button>
    </div>

    <div class="conv-list" id="conv-list">
      <!-- injected by JS -->
    </div>

    <div class="sidebar-footer">
      <button class="footer-btn" id="settings-btn">
        <span>⚙</span> Settings
      </button>
      <a class="footer-btn" href="/logout">
        <span>↩</span> Sign out
      </a>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Mobile top bar -->
    <div class="topbar">
      <button class="topbar-btn" id="menu-btn">☰</button>
      <span class="topbar-title"><span style="color:var(--accent)">✳</span> Canvas Assistant</span>
      <button class="topbar-btn" id="new-chat-btn-mobile">✏</button>
    </div>

    <!-- Welcome screen -->
    <div class="welcome" id="welcome">
      <div class="welcome-icon">✳</div>
      <h1 class="welcome-title">How can I help, {{ user.name.split()[0] }}?</h1>
      <div class="suggestions">
        <button class="suggestion-btn">What's due tonight?</button>
        <button class="suggestion-btn">Do I have any tests this week?</button>
        <button class="suggestion-btn">What should I study for?</button>
        <button class="suggestion-btn">Am I missing any assignments?</button>
      </div>
    </div>

    <!-- Chat area -->
    <div class="chat-area hidden" id="chat-area">
      <div class="messages" id="messages"></div>
    </div>

    <!-- Input -->
    <div class="input-wrap" id="input-wrap">
      <div class="input-box">
        <textarea id="question-input" placeholder="Message Canvas Assistant…" rows="1"></textarea>
        <button class="send-btn" id="send-btn" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 1l7 7-7 7M1 8h14" stroke="currentColor" stroke-width="1.8"
                  fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
